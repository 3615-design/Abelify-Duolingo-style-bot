const questions = [
  {
    q: "What is the capital of India?",
    options: ["Mumbai", "Delhi", "Kolkata", "Chennai"],
    answer: 1
  },
  {
    q: "Which planet is known as the Red Planet?",
    options: ["Earth", "Mars", "Jupiter", "Venus"],
    answer: 1
  },
  {
    q: "5 × 6 = ?",
    options: ["11", "30", "56", "65"],
    answer: 1
  },
  {
    q: "Water freezes at ___ °C.",
    options: ["0", "10", "50", "100"],
    answer: 0
  },
  {
    q: "Which gas do plants release during photosynthesis?",
    options: ["Oxygen", "Nitrogen", "Carbon dioxide", "Helium"],
    answer: 0
  }
];

let qIndex = 0;

// -----------------------------
// GAME VARIABLES
// -----------------------------
let streak = 0;
let gems = 1000;
let energy = 30;
let freezes = 3;
let xp = 0;
let lastPracticeDate = null;

function todayStr() {
  return new Date().toDateString();
}

function log(msg) {
  const box = document.getElementById('log');
  box.innerHTML += msg + '<br>';
  box.scrollTop = box.scrollHeight;
}

function updateUI() {
  document.getElementById('streak').textContent = '🔥 Streak: ' + streak;
  document.getElementById('gems').textContent = '💎 Gems: ' + gems;
  document.getElementById('energy').textContent = '⚡ Energy: ' + energy;
  document.getElementById('freezes').textContent = '🧊 Streak Freezes: ' + freezes;
  document.getElementById('xp').textContent = '⭐ XP: ' + xp;
}

function ensureDate() {
  const today = todayStr();
  if (!lastPracticeDate) {
    lastPracticeDate = today;
    streak = 1;
    log('First day! Streak started at 1.');
  } else if (lastPracticeDate !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yStr = yesterday.toDateString();
    if (lastPracticeDate === yStr) {
      streak += 1;
      log('New day, streak increased to ' + streak + '.');
    } else {
      if (freezes > 0) {
        freezes -= 1;
        log('Missed a day, but a freeze saved your streak.');
      } else {
        streak = 1;
        log('Streak reset to 1.');
      }
    }
    lastPracticeDate = today;
  }
}

// QUIZ SYSTEM
// -----------------------------
function showQuestion() {
  const q = questions[qIndex];
  log("<b>Q" + (qIndex + 1) + ":</b> " + q.q);

  q.options.forEach((opt, i) => {
    log(`<button onclick="checkAnswer(${i})">${opt}</button>`);
  });
}

function checkAnswer(choice) {
  const q = questions[qIndex];

  if (choice === q.answer) {
    xp += 10;
    log("<span style='color:green;'>Correct! +10 XP</span>");
  } else {
    log("<span style='color:red;'>Wrong answer.</span>");
  }

  qIndex++;

  if (qIndex >= questions.length) {
    log("<b>🎉 Unit Complete! +5 Energy</b>");
    energy += 5;
    qIndex = 0; // restart
  }

  updateUI();
  setTimeout(showQuestion, 800);
}

// -----------------------------
// START QUIZ
// -----------------------------
function startQuiz() {
  if (energy < 2) {
    log("Not enough energy to start a lesson.");
    return;
  }
  ensureDate();
  energy -= 2;
  updateUI();
  showQuestion();
}

updateUI();
