<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Abelify – Duolingo Style Quiz Bot</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
    .app { max-width: 800px; margin: 20px auto; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.1); }
    h1 { margin-top:0; }
    .stats { display:flex; gap:15px; margin-bottom:15px; flex-wrap:wrap; }
    .stat { background:#eef; padding:8px 12px; border-radius:6px; font-size:14px; }
    .log { border:1px solid #ddd; height:250px; overflow-y:auto; padding:10px; border-radius:6px; background:#fafafa; margin-bottom:10px; font-size:14px; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; }
    button { padding:8px 14px; border:none; border-radius:6px; cursor:pointer; background:#4f46e5; color:#fff; font-size:14px; }
    button.secondary { background:#0f766e; }
    button.danger { background:#b91c1c; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Abelify – Duolingo Style Quiz Bot</h1>

    <div class="stats">
      <div class="stat" id="streak">🔥 Streak: 0</div>
      <div class="stat" id="gems">💎 Gems: 1000</div>
      <div class="stat" id="energy">⚡ Energy: 30</div>
      <div class="stat" id="freezes">🧊 Streak Freezes: 3</div>
      <div class="stat" id="xp">⭐ XP: 0</div>
    </div>

    <div class="log" id="log"></div>

    <div class="controls">
      <button onclick="completeLesson()">Complete Lesson</button>
      <button class="secondary" onclick="buyStreakFreeze()">Buy Streak Freeze (230💎)</button>
      <button class="secondary" onclick="buyEnergy()">Buy Energy (600💎)</button>
      <button class="secondary" onclick="buyTimerBoost()">Buy Timer Boost (450💎)</button>
      <button class="danger" onclick="simulateMissedDay()">Simulate Missed Day</button>
    </div>
  </div>

  <script>
    let streak = 0;
    let gems = 1000;
    let energy = 30;
    let freezes = 3;
    let xp = 0;
    let lessonsToday = 0;
    let lastPracticeDate = null;

    function todayStr() {
      return new Date().toDateString();
    }

    function log(msg) {
      const box = document.getElementById('log');
      box.innerHTML += msg + '<br>';
      box.scrollTop = box.scrollHeight;
    }

    function updateUI() {
      document.getElementById('streak').textContent = '🔥 Streak: ' + streak;
      document.getElementById('gems').textContent = '💎 Gems: ' + gems;
      document.getElementById('energy').textContent = '⚡ Energy: ' + energy;
      document.getElementById('freezes').textContent = '🧊 Streak Freezes: ' + freezes;
      document.getElementById('xp').textContent = '⭐ XP: ' + xp;
    }

    function ensureDate() {
      const today = todayStr();
      if (!lastPracticeDate) {
        lastPracticeDate = today;
        streak = 1;
        log('First day! Streak started at 1.');
      } else if (lastPracticeDate !== today) {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yStr = yesterday.toDateString();
        if (lastPracticeDate === yStr) {
          streak += 1;
          log('New day, streak increased to ' + streak + '.');
        } else {
          if (freezes > 0) {
            freezes -= 1;
            log('You missed a day, but a streak freeze was used. Streak stays at ' + streak + '.');
          } else {
            streak = 1;
            log('You missed too many days. Streak reset to 1.');
          }
        }
        lastPracticeDate = today;
      }
    }

    function completeLesson() {
      if (energy < 2) {
        log('Not enough energy to complete a lesson.');
        return;
      }
      ensureDate();
      energy -= 2;
      xp += 10;
      lessonsToday += 1;
      log('Lesson completed! -2 energy, +10 XP.');

      if (lessonsToday % 5 === 0) {
        energy += 5;
        log('You completed 5 lessons in this unit! +5 bonus energy.');
      }

      updateUI();
    }

    function buyStreakFreeze() {
      if (gems < 230) {
        log('Not enough gems to buy a streak freeze.');
        return;
      }
      gems -= 230;
      freezes += 1;
      log('Bought 1 streak freeze for 230 gems.');
      updateUI();
    }

    function buyEnergy() {
      if (gems < 600) {
        log('Not enough gems to buy energy.');
        return;
      }
      gems -= 600;
      energy += 20;
      log('Bought extra energy for 600 gems (+20 energy).');
      updateUI();
    }

    function buyTimerBoost() {
      if (gems < 450) {
        log('Not enough gems to buy a timer boost.');
        return;
      }
      gems -= 450;
      log('Bought a timer boost for 450 gems (placeholder effect).');
      updateUI();
    }

    function simulateMissedDay() {
      if (!lastPracticeDate) {
        log('You have not started a streak yet.');
        return;
      }
      const d = new Date(lastPracticeDate);
      d.setDate(d.getDate() - 2);
      lastPracticeDate = d.toDateString();
      log('Simulated missing more than one day. Complete a lesson to see streak behavior.');
      updateUI();
    }

    updateUI();
    log('Welcome to Abelify! Start by completing a lesson.');
  </script>
</body>
